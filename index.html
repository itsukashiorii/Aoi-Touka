<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aoi Touka </title>
<!-- Import Font Cheeky Rabbit dari CDN -->
<link href="https://fonts.cdnfonts.com/css/cheeky-rabbit" rel="stylesheet">
<!-- Import Google Font untuk body text -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
    margin: 0; 
    font-family: 'Cheeky Rabbit', cursive;
    color: #fff;
    overflow: hidden;
    background: #0a0a0a;
}

/* Animated gradient background */
.bg-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.bg-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, 
        rgba(255, 107, 157, 0.3) 0%, 
        rgba(155, 89, 182, 0.3) 50%, 
        rgba(52, 152, 219, 0.3) 100%);
    animation: gradientShift 8s ease infinite;
}

@keyframes gradientShift {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.6; }
}

/* Dark overlay with anime style */
.bg-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, 
        rgba(10, 10, 20, 0.7) 0%, 
        rgba(20, 10, 30, 0.85) 50%,
        rgba(10, 10, 20, 0.95) 100%);
    z-index: -1;
    backdrop-filter: blur(1px);
}

/* Floating particles */
.particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
}

.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(255, 107, 157, 0.6);
    border-radius: 50%;
    animation: float 15s infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.container { 
    display: flex; 
    height: 100vh;
    position: relative;
    z-index: 1;
}

/* Sidebar dengan style anime modern */
.sidebar { 
    width: 90px; 
    overflow-y: auto; 
    background: rgba(20, 20, 30, 0.85);
    padding: 15px 8px;
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255, 107, 157, 0.2);
    box-shadow: 5px 0 30px rgba(0, 0, 0, 0.5);
}

.sidebar::-webkit-scrollbar {
    width: 6px;
}

.sidebar::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 3px;
}

.sidebar::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #ff6b9d, #9b59b6);
    border-radius: 3px;
}

.sidebar img { 
    width: 70px; 
    height: 70px;
    object-fit: cover;
    margin-bottom: 10px; 
    cursor: pointer; 
    border-radius: 12px;
    border: 2px solid transparent;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: block;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.sidebar img:hover { 
    border-color: #ff6b9d;
    transform: scale(1.15) translateY(-3px);
    box-shadow: 0 8px 25px rgba(255, 107, 157, 0.5);
}

.sidebar img.active {
    border-color: #ff6b9d;
    box-shadow: 0 0 30px rgba(255, 107, 157, 0.8),
                inset 0 0 20px rgba(255, 107, 157, 0.3);
    transform: scale(1.1);
}

.main { 
    flex: 1; 
    display: flex; 
    flex-direction: column;
    justify-content: center; 
    align-items: center;
    padding: 30px;
    position: relative;
}

/* Main image container dengan frame anime */
.main-image-container {
    position: relative;
    padding: 15px;
    background: linear-gradient(135deg, 
        rgba(11, 107, 157, 0.3), 
        rgba(155, 89, 182, 0.3));
    border-radius: 2px;
    box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 0 0 2px rgba(255, 255, 255, 0.1);
}

.main-image-container::before {
    content: 'O✦';
    position: absolute;
    top: -5px;
    left: -5px;
    font-size: 24px;
    color: #ff6b9d;
    animation: sparkle 2s ease-in-out infinite;
}

.main-image-container::after {
    content: '✦o';
    position: absolute;
    bottom: -5px;
    right: -5px;
    font-size: 24px;
    color: #9b59b6;
    animation: sparkle 2s ease-in-out infinite reverse;
}

@keyframes sparkle {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
}

.main img { 
    max-width: 100%;
    max-height: 65vh;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 2px;
    box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.main img:hover {
    transform: scale(1.03);
    box-shadow: 0 25px 80px rgba(255, 107, 157, 0.3);
}

/* Character name dengan font Cheeky Rabbit */
.character-name {
    margin-top: 25px;
    font-family: 'Cheeky Rabbit', cursive;
    font-size: 3.5rem;
    font-weight: 400;
    text-align: center;
    text-shadow: 
        0 0 20px rgba(255, 107, 157, 0.8),
        0 0 40px rgba(255, 107, 157, 0.4),
        3px 3px 0px rgba(155, 89, 182, 0.5);
    letter-spacing: 2px;
    background: linear-gradient(135deg, #ff6b9d, #c44569, #9b59b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: glow 3s ease-in-out infinite;
    line-height: 1.2;
}

@keyframes glow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
}

.series-name {
    margin-top: 8px;
    font-family: 'Cheeky Rabbit', cursive;
    font-size: 1rem;
    color: rgba(255, 255, 255, 0.7);
    text-transform: uppercase;
    letter-spacing: 4px;
    font-weight: 600;
}

/* Search container yang lebih bagus */
.search-container {
    position: fixed; 
    top: 25px; 
    left: 110px; 
    z-index: 100;
    width: 320px;
}

.search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

.search-icon {
    position: absolute;
    left: 18px;
    font-size: 18px;
    color: rgba(255, 107, 157, 0.8);
    z-index: 10;
}

input { 
    padding: 1px 2px 1px 50px; 
    border-radius: 3px; 
    border: none;
    background: rgba(30, 30, 45, 0.9);
    color: #fff;
    width: 100%;
    font-size: 15px;
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255, 107, 157, 0.3);
    transition: all 0.3s ease;
    font-family: 'Nunito', sans-serif;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

input:focus {
    outline: none;
    border-color: #ff6b9d;
    box-shadow: 
        0 0 30px rgba(255, 107, 157, 0.4),
        0 8px 32px rgba(0, 0, 0, 0.3);
    transform: translateY(-2px);
}

input::placeholder {
    color: rgba(255, 255, 255, 0.5);
}

/* Suggestions yang lebih modern - PERBAIKAN SCROLL */
.suggestions { 
    background: rgba(25, 25, 40, 0.98); 
    position: absolute; 
    top: 65px; 
    width: 100%; 
    border-radius: 20px;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 107, 157, 0.3);
    max-height: 450px; /* Tinggi maksimal lebih besar */
    overflow-y: auto; /* Scroll jika terlalu banyak */
    box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 30px rgba(255, 107, 157, 0.2);
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s ease;
    pointer-events: none;
}

.suggestions.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

.suggestions::-webkit-scrollbar {
    width: 6px;
}

.suggestions::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #ff6b9d, #9b59b6);
    border-radius: 3px;
}

.suggestion-item { 
    padding: 15px 20px; 
    cursor: pointer;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 12px;
}

.suggestion-item:last-child {
    border-bottom: none;
}

.suggestion-item:hover { 
    background: linear-gradient(90deg, rgba(255, 107, 157, 0.2), transparent);
    padding-left: 25px;
}

.suggestion-item img {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    object-fit: cover;
    border: 2px solid rgba(255, 107, 157, 0.5);
}

.suggestion-info {
    flex: 1;
}

.suggestion-name {
    font-weight: 700;
    color: #fff;
    font-size: 14px;
}

.suggestion-series {
    font-size: 12px;
    color: rgba(255, 107, 157, 0.8);
    margin-top: 2px;
}

.no-results {
    padding: 20px;
    text-align: center;
    color: rgba(255, 255, 255, 0.5);
    font-style: italic;
}

/* Search stats */
.search-stats {
    padding: 10px 20px;
    background: rgba(255, 107, 157, 0.1);
    border-bottom: 1px solid rgba(255, 107, 157, 0.2);
    font-size: 12px;
    color: rgba(255, 107, 157, 0.9);
    text-align: center;
    font-weight: 600;
}

/* Navigation buttons yang lebih stylish */
.nav-buttons {
    position: fixed;
    bottom: 40px;
    left: 37%;
    transform: translateX(-50%);
    display: flex;
    gap: 2px;
    z-index: 100;
}

.nav-btn {
    padding: 105px 35px;
    background: linear-gradient(5deg, rgba(255, 107, 157, 0.3), rgba(155, 89, 182, 0.3));
    border: 2px solid rgba(255, 107, 157, 0.5);
    color: #fff;
    border-radius: 3px;
    cursor: pointer;
    backdrop-filter: blur(20px);
    transition: all 0.3s ease;
    font-size: 15px;
    font-weight: 700;
    font-family: 'q', sans-serif;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    font-family: 'Cheeky Rabbit', cursive;
}

.nav-btn:hover {
    background: linear-gradient(135deg, rgba(255, 107, 157, 0.5), rgba(155, 89, 182, 0.5));
    transform: translateY(-3px);
    box-shadow: 
        0 15px 40px rgba(255, 107, 157, 0.4),
        0 0 30px rgba(255, 107, 157, 0.3);
    border-color: #ff6b9d;
}

.nav-btn:active {
    transform: translateY(-1px);
}

/* Category label */
.category-label {
    position: fixed;
    top: 1100px;
    right: 25px;
    padding: 1px 4px;
    background: linear-gradient(135deg, rgba(255, 107, 157, 0.3), rgba(155, 89, 182, 0.3));
    border: 2px solid rgba(255, 107, 157, 0.4);
    border-radius: 2px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    backdrop-filter: blur(20px);
    font-weight: 700;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    animation: borderGlow 3s ease-in-out infinite;
    font-family: 'Cheeky Rabbit', cursive;
}

@keyframes borderGlow {
    0%, 100% { border-color: rgba(255, 107, 157, 0.4); }
    50% { border-color: rgba(255, 107, 157, 0.8); }
}

/* Counter */
.counter {
    position: fixed;
    bottom: 40px;
    right: 40px;
    padding: 10px 20px;
    background: rgba(20, 20, 30, 0.8);
    border-radius: 2px;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 107, 157, 0.3);
    font-family: 'Cheeky Rabbit', cursive;
}

.counter span {
    color: #ff6b9d;
    font-weight: 700;
}

/* Loading animation */
.loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3rem;
    color: #ff6b9d;
    z-index: 1000;
    animation: pulse 1.5s ease-in-out infinite;
    font-family: 'Cheeky Rabbit', cursive;
}

@keyframes pulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
}

/* Responsive */
@media (max-width: 768px) {
    .sidebar { width: 70px; padding: 10px 5px; }
    .sidebar img { width: 55px; height: 55px; }
    .search-container { width: 250px; left: 90px; }
    .character-name { font-size: 1.8rem; }
    .nav-btn { padding: 1px 25px; font-size: 13px; }
    .suggestions { max-height: 350px; }
}
</style>

let currentIndex = 0;

const sidebar = document.getElementById("sidebar");
const mainImage = document.getElementById("mainImage");
const charName = document.getElementById("charName");
const seriesName = document.getElementById("seriesName");
const bgContainer = document.getElementById("bgContainer");
const categoryLabel = document.getElementById("categoryLabel");
const currentNum = document.getElementById("currentNum");
const totalNum = document.getElementById("totalNum");

// Update total counter
totalNum.textContent = characters.length;

// Generate particles
function createParticles() {
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        particlesContainer.appendChild(particle);
    }
}
createParticles();

// Generate sidebar
characters.forEach((char, index) => {
    let img = document.createElement("img");
    img.src = char.img;
    img.alt = char.name;
    img.dataset.index = index;
    img.loading = "lazy";
    img.onclick = () => selectCharacter(index);
    sidebar.appendChild(img);
});

function selectCharacter(index) {
    currentIndex = index;
    const char = characters[index];

    // Update main image dengan fade effect
    mainImage.style.opacity = '0';
    mainImage.style.transform = 'scale(0.95)';

    setTimeout(() => {
        mainImage.src = char.img;
        mainImage.onload = () => {
            mainImage.style.opacity = '1';
            mainImage.style.transform = 'scale(1)';
        };
    }, 200);

    // Update text
    charName.textContent = char.name;
    seriesName.textContent = char.series;
    categoryLabel.textContent = '✨oO' + char.series;
    currentNum.textContent = index + 1;

    // Update background
    bgContainer.style.backgroundImage = `url(${char.img})`;

    // Update active state di sidebar
    document.querySelectorAll('.sidebar img').forEach((img, i) => {
        if (i === index) {
            img.classList.add('active');
            img.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
            img.classList.remove('active');
        }
    });

    // Save to localStorage
    localStorage.setItem('lastCharacter', index);
}

function nextChar() {
    currentIndex = (currentIndex + 1) % characters.length;
    selectCharacter(currentIndex);
}

function prevChar() {
    currentIndex = (currentIndex - 1 + characters.length) % characters.length;
    selectCharacter(currentIndex);
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') nextChar();
    if (e.key === 'ArrowLeft') prevChar();
});

// ==================== PERBAIKAN PENCARIAN ====================
// Fungsi pencarian yang menampilkan SEMUA hasil yang relevan

function calculateRelevance(char, searchTerm) {
    const nameLower = char.name.toLowerCase();
    const seriesLower = char.series.toLowerCase();
    const term = searchTerm.toLowerCase().trim();
    
    // Exact match nama = score tertinggi
    if (nameLower === term) return 100;
    
    // Nama dimulai dengan search term
    if (nameLower.startsWith(term)) return 90;
    
    // Nama mengandung search term
    if (nameLower.includes(term)) return 80;
    
    // Series dimulai dengan search term
    if (seriesLower.startsWith(term)) return 70;
    
    // Series mengandung search term
    if (seriesLower.includes(term)) return 60;
    
    // Partial match untuk nama (fuzzy)
    const nameWords = nameLower.split(/\s+/);
    for (let word of nameWords) {
        if (word.startsWith(term)) return 50;
        if (word.includes(term)) return 40;
    }
    
    // Partial match untuk series
    const seriesWords = seriesLower.split(/\s+/);
    for (let word of seriesWords) {
        if (word.startsWith(term)) return 30;
        if (word.includes(term)) return 20;
    }
    
    // Tidak cocok
    return 0;
}

const searchBox = document.getElementById("searchBox");
const suggestions = document.getElementById("suggestions");

searchBox.addEventListener("input", () => {
    const value = searchBox.value.trim();
    suggestions.innerHTML = "";

    if (value.length === 0) {
        suggestions.classList.remove('show');
        return;
    }

    // Hitung relevance untuk SEMUA karakter
    let results = characters.map((char, idx) => {
        const score = calculateRelevance(char, value);
        return {
            char: char,
            index: idx,
            score: score
        };
    })
    // Filter hanya yang memiliki relevance > 0 (cocok minimal)
    .filter(r => r.score > 0)
    // Sort berdasarkan score tertinggi
    .sort((a, b) => b.score - a.score);

    // Tampilkan statistik pencarian
    const statsDiv = document.createElement("div");
    statsDiv.className = "search-stats";
    statsDiv.textContent = `✨ Ditemukan ${results.length} karakter`;
    suggestions.appendChild(statsDiv);

    if (results.length === 0) {
        const noResults = document.createElement("div");
        noResults.className = "no-results";
        noResults.innerHTML = `✧ Tidak ada hasil untuk "<strong>${escapeHtml(value)}</strong>" ✧<br><small>Coba kata kunci lain</small>`;
        suggestions.appendChild(noResults);
    } else {
        // Tampilkan SEMUA hasil (tidak dibatasi)
        results.forEach(r => {
            let div = document.createElement("div");
            div.className = "suggestion-item";
            div.innerHTML = `
                <img src="${r.char.img}" alt="${escapeHtml(r.char.name)}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect width=%2240%22 height=%2240%22 fill=%22%23ff6b9d%22/><text x=%2220%22 y=%2225%22 font-size=%2214%22 fill=%22white%22 text-anchor=%22middle%22>${r.char.name.charAt(0)}</text></svg>'">
                <div class="suggestion-info">
                    <div class="suggestion-name">${highlightMatch(r.char.name, value)}</div>
                    <div class="suggestion-series">${highlightMatch(r.char.series, value)}</div>
                </div>
            `;
            div.onclick = () => {
                selectCharacter(r.index);
                suggestions.innerHTML = "";
                suggestions.classList.remove('show');
                searchBox.value = "";
            };
            suggestions.appendChild(div);
        });
    }

    suggestions.classList.add('show');
});

// Helper function untuk escape HTML
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Helper function untuk highlight text yang cocok
function highlightMatch(text, searchTerm) {
    if (!searchTerm) return escapeHtml(text);
    const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
    return escapeHtml(text).replace(regex, '<span style="color: #ff6b9d; font-weight: bold;">$1</span>');
}

// Helper function untuk escape regex special characters
function escapeRegex(string) {
    return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// Close suggestions when clicking outside
document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-container')) {
        suggestions.classList.remove('show');
    }
});

// Focus search on /
document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== searchBox) {
        e.preventDefault();
        searchBox.focus();
    }
    if (e.key === 'Escape') {
        suggestions.classList.remove('show');
        searchBox.blur();
    }
});

// Load last viewed character or select first
const lastChar = localStorage.getItem('lastCharacter');
if (lastChar !== null) {
    selectCharacter(parseInt(lastChar));
} else {
    selectCharacter(0);
}
