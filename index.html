<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>「GREED」メ 𝙼𝚊𝚁𝙻𝚘𝙽</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Courier+Prime:wght@400;700&family=VT323&family=Creepster&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: #f0f2f5;
        }

        /* ============================================
           HAPPY MODE (Normal)
           ============================================ */
        body.happy-mode {
            background: linear-gradient(135deg, #f0f2f5 0%, #e4e7eb 100%);
            animation: none;
        }

        /* ============================================
           SAD TEXT STREAM CONTAINER
           ============================================ */
        .text-stream-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: none;
            overflow: hidden;
            pointer-events: none;
        }

        body.sad-mode .text-stream-container {
            display: block;
        }

        .text-column {
            position: absolute;
            top: -100%;
            width: 120px;
            font-family: 'VT323', monospace;
            font-size: 18px;
            line-height: 1.4;
            text-align: center;
            opacity: 0.7;
            animation: scrollDown linear infinite;
            text-shadow: 0 0 10px currentColor;
        }

        @keyframes scrollDown {
            0% { transform: translateY(0); }
            100% { transform: translateY(200vh); }
        }

        /* ============================================
           HELL BACKGROUND
           ============================================ */
        .hell-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            display: none;
            background: radial-gradient(ellipse at center, #3a0000 0%, #000000 70%);
        }

        body.sad-mode .hell-bg {
            display: block;
            animation: hellPulse 4s infinite;
        }

        @keyframes hellPulse {
            0%, 100% { 
                background: radial-gradient(ellipse at center, #4a0000 0%, #000000 70%);
                filter: hue-rotate(0deg);
            }
            50% { 
                background: radial-gradient(ellipse at center, #6a0000 0%, #1a0000 70%);
                filter: hue-rotate(15deg);
            }
        }

        /* Blood overlay */
        .blood-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(139, 0, 0, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(178, 34, 34, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(139, 0, 0, 0.2) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9990;
            display: none;
            animation: bloodMove 8s infinite;
        }

        body.sad-mode .blood-overlay {
            display: block;
        }

        @keyframes bloodMove {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            50% { transform: scale(1.1) rotate(2deg); opacity: 0.8; }
        }

        /* ============================================
           GLITCH LAYERS (Mode Sedih)
           ============================================ */
        .glitch-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: none;
            overflow: hidden;
        }

        body.sad-mode .glitch-container {
            display: block;
        }

        .glitch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            mix-blend-mode: screen;
        }

        .glitch-red {
            background: rgba(139, 0, 0, 0.15);
            animation: glitchRed 0.15s infinite;
        }

        .glitch-blue {
            background: rgba(0, 0, 139, 0.1);
            animation: glitchBlue 0.2s infinite;
        }

        .glitch-green {
            background: rgba(0, 100, 0, 0.1);
            animation: glitchGreen 0.18s infinite;
        }

        @keyframes glitchRed {
            0%, 100% { transform: translate(0); opacity: 0; }
            10% { transform: translate(-10px, 5px); opacity: 0.5; }
            20% { transform: translate(10px, -5px); opacity: 0.2; }
            30% { transform: translate(-5px, 0); opacity: 0.4; }
            40% { transform: translate(5px, 5px); opacity: 0.1; }
            50% { transform: translate(-8px, -3px); opacity: 0.6; }
            60% { transform: translate(8px, 3px); opacity: 0.3; }
            70% { transform: translate(-3px, 8px); opacity: 0.5; }
            80% { transform: translate(3px, -8px); opacity: 0.2; }
            90% { transform: translate(-5px, 5px); opacity: 0.4; }
        }

        @keyframes glitchBlue {
            0%, 100% { transform: translate(0); opacity: 0; }
            15% { transform: translate(8px, -5px); opacity: 0.3; }
            30% { transform: translate(-8px, 5px); opacity: 0.1; }
            45% { transform: translate(5px, 0); opacity: 0.4; }
            60% { transform: translate(-5px, -8px); opacity: 0.2; }
            75% { transform: translate(10px, 8px); opacity: 0.5; }
            90% { transform: translate(-10px, -5px); opacity: 0.3; }
        }

        @keyframes glitchGreen {
            0%, 100% { transform: translate(0); opacity: 0; }
            20% { transform: translate(-6px, 8px); opacity: 0.25; }
            40% { transform: translate(6px, -8px); opacity: 0.5; }
            60% { transform: translate(-8px, -5px); opacity: 0.15; }
            80% { transform: translate(8px, 5px); opacity: 0.4; }
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(139, 0, 0, 0.3) 50%,
                rgba(139, 0, 0, 0.3)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9998;
            display: none;
            animation: scrollScanlines 5s linear infinite;
        }

        body.sad-mode .scanlines {
            display: block;
        }

        @keyframes scrollScanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* ============================================
           TOGGLE BUTTON
           ============================================ */
        .mode-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            background: #000;
            cursor: pointer;
            z-index: 10000;
            padding: 0;
            overflow: hidden;
            transition: all 0.2s steps(3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .mode-toggle-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        .toggle-btn-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.1s steps(2);
        }

        /* Mode Sad - Button EXTREME Error Effect */
        body.sad-mode .mode-toggle-btn {
            border-color: #ff0000;
            border-radius: 0;
            transform: rotate(5deg) scale(0.9);
            animation: buttonExtremeGlitch 0.5s infinite steps(2);
            filter: contrast(2) brightness(0.6) hue-rotate(0deg);
            clip-path: polygon(10% 0%, 90% 5%, 100% 85%, 5% 100%);
            box-shadow: 
                0 0 20px rgba(255, 0, 0, 0.8),
                inset 0 0 20px rgba(139, 0, 0, 0.5);
        }

        @keyframes buttonExtremeGlitch {
            0%, 100% { 
                transform: rotate(5deg) scale(0.9) translate(0, 0);
                clip-path: polygon(10% 0%, 90% 5%, 100% 85%, 5% 100%);
                filter: contrast(2) brightness(0.6);
            }
            10% { 
                transform: rotate(8deg) scale(0.85) translate(-5px, 3px);
                clip-path: polygon(15% 5%, 85% 0%, 95% 90%, 0% 85%);
                filter: contrast(3) brightness(0.4) hue-rotate(90deg);
            }
            20% { 
                transform: rotate(2deg) scale(0.95) translate(5px, -3px);
                clip-path: polygon(5% 10%, 95% 15%, 90% 80%, 10% 95%);
                filter: contrast(2.5) brightness(0.8) hue-rotate(-90deg);
            }
            30% { 
                transform: rotate(12deg) scale(0.8) translate(-8px, 5px);
                clip-path: polygon(20% 0%, 80% 10%, 100% 75%, 15% 90%);
                filter: contrast(4) brightness(0.3);
            }
            40% { 
                transform: rotate(-3deg) scale(1) translate(8px, -5px);
                clip-path: polygon(0% 20%, 100% 5%, 85% 100%, 10% 85%);
                filter: contrast(2) brightness(0.5) hue-rotate(180deg);
            }
            50% { 
                transform: rotate(5deg) scale(0.9) translate(0, 0);
                clip-path: polygon(10% 0%, 90% 5%, 100% 85%, 5% 100%);
                filter: contrast(2) brightness(0.6);
            }
            60% { 
                transform: rotate(-8deg) scale(0.88) translate(-3px, 8px);
                filter: contrast(3.5) brightness(0.4) hue-rotate(45deg);
            }
            70% { 
                transform: rotate(15deg) scale(0.82) translate(3px, -8px);
                filter: contrast(2.2) brightness(0.7) hue-rotate(-45deg);
            }
            80% { 
                transform: rotate(0deg) scale(0.92) translate(-6px, 2px);
                filter: contrast(4) brightness(0.3);
            }
            90% { 
                transform: rotate(10deg) scale(0.87) translate(6px, -2px);
                filter: contrast(2.8) brightness(0.5) hue-rotate(135deg);
            }
        }

        /* ============================================
           CARD STYLES
           ============================================ */
        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 350px;
            width: 90%;
            position: relative;
            z-index: 10;
            transition: all 0.3s;
        }

        .whatsapp-icon { margin-bottom: 15px; }
        .card h1 { font-size: 22px; margin-bottom: 10px; color: #1c1e21; font-weight: 700; }
        .card p { font-size: 15px; color: #606770; margin-bottom: 30px; line-height: 1.5; }

        .wa-btn {
            background-color: #25D366;
            color: white;
            padding: 14px 24px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 80%;
            transition: all 0.3s;
        }

        .wa-btn:hover { background-color: #128C7E; transform: scale(1.05); }

        /* ============================================
           SAD MODE - EXTREME ERROR
           ============================================ */
        body.sad-mode {
            background: #1a0000;
            animation: bodyExtremeGlitch 0.3s infinite;
            cursor: none;
        }

        @keyframes bodyExtremeGlitch {
            0%, 100% { background: #1a0000; }
            25% { background: #2a0000; }
            50% { background: #0f0000; }
            75% { background: #3a0000; }
        }

        /* Card Error Effect - EXTREME */
        body.sad-mode .card {
            background: #0a0a0a;
            border: 3px solid #ff0000;
            border-radius: 0;
            box-shadow: 
                0 0 30px rgba(255, 0, 0, 0.6),
                0 0 60px rgba(255, 0, 0, 0.3),
                inset 0 0 50px rgba(139, 0, 0, 0.2);
            animation: cardExtremeError 1.5s infinite steps(3);
            position: relative;
            overflow: hidden;
        }

        body.sad-mode .card::before {
            content: 'CRITICAL ERROR';
            position: absolute;
            top: 10px;
            right: -35px;
            background: #ff0000;
            color: #000000;
            font-size: 10px;
            padding: 3px 35px;
            transform: rotate(45deg);
            font-family: 'Courier Prime', monospace;
            font-weight: bold;
            opacity: 0.9;
            animation: errorFlicker 0.2s infinite;
        }

        body.sad-mode .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255, 0, 0, 0.03) 2px,
                rgba(255, 0, 0, 0.03) 4px
            );
            pointer-events: none;
            animation: staticNoise 0.1s infinite;
        }

        @keyframes errorFlicker {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 0.3; }
        }

        @keyframes staticNoise {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        @keyframes cardExtremeError {
            0%, 100% { 
                transform: translate(0) skew(0deg) scale(1);
                border-color: #ff0000;
                box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            }
            10% { 
                transform: translate(-3px, 2px) skew(-2deg) scale(0.98);
                border-color: #ff3333;
                box-shadow: 0 0 40px rgba(255, 50, 50, 0.8);
            }
            20% { 
                transform: translate(3px, -2px) skew(2deg) scale(1.02);
                border-color: #ff0000;
            }
            30% { 
                transform: translate(-2px, 3px) skew(1deg) scale(0.99);
                border-color: #ff3333;
                box-shadow: 0 0 50px rgba(255, 0, 0, 0.9);
            }
            40% { 
                transform: translate(2px, -3px) skew(-1deg) scale(1.01);
                border-color: #ff0000;
            }
            50% { 
                transform: translate(0) skew(0deg) scale(1);
                border-color: #ff0000;
            }
            60% { 
                transform: translate(5px, 0) skew(-3deg) scale(0.97);
                border-color: #ff3333;
            }
            70% { 
                transform: translate(-5px, 0) skew(3deg) scale(1.03);
                border-color: #ff0000;
            }
            80% { 
                transform: translate(0, 3px) skew(0deg) scale(0.98);
                border-color: #ff3333;
            }
            90% { 
                transform: translate(0, -3px) skew(0deg) scale(1.02);
                border-color: #ff0000;
            }
        }

        /* Content Sad - WARNA Teks Diperbaiki untuk Kontras Tinggi */
        .sad-content {
            display: none;
            font-family: 'Courier Prime', monospace;
            color: #ffffff;
        }

        body.sad-mode .happy-content { display: none; }
        body.sad-mode .sad-content { display: block; }

        .error-code {
            font-size: 12px;
            color: #ff0000;
            margin-bottom: 15px;
            letter-spacing: 4px;
            font-weight: bold;
            text-shadow: 
                0 0 10px #ff0000,
                0 0 20px #ff0000,
                0 0 30px #ff0000;
            animation: errorCodeFlicker 0.5s infinite alternate;
        }

        @keyframes errorCodeFlicker {
            0%, 100% { 
                opacity: 1; 
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #ff0000;
            }
            50% { 
                opacity: 0.8; 
                text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000, 0 0 15px #ff0000;
            }
        }

        .sad-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: iconCorrupt 1s infinite steps(2);
            filter: grayscale(100%) brightness(0.8) sepia(1) hue-rotate(-50deg) saturate(5);
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        @keyframes iconCorrupt {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.2) rotate(10deg); filter: invert(1); }
            50% { transform: scale(0.8) rotate(-10deg); }
            75% { transform: scale(1.1) rotate(5deg); filter: invert(0.5); }
        }

        .sad-title {
            font-size: 32px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 25px;
            position: relative;
            animation: titleGlitch 2s infinite;
            text-shadow: 
                0 0 10px #ff0000,
                0 0 20px #ff0000,
                0 0 40px #ff0000,
                0 0 80px #ff0000;
            font-family: 'Creepster', cursive;
            font-weight: bold;
        }

        @keyframes titleGlitch {
            0%, 100% { 
                opacity: 1;
                transform: translate(0);
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
            }
            10% { 
                opacity: 0.9;
                transform: translate(-2px, 1px);
                text-shadow: -2px 0 #ff0000, 2px 0 #ff6666, 0 0 30px #ff0000;
            }
            20% { 
                opacity: 1;
                transform: translate(2px, -1px);
                letter-spacing: 12px;
                text-shadow: 2px 0 #ff0000, -2px 0 #ff3333, 0 0 50px #ff0000;
            }
            30% { 
                opacity: 0.85;
                transform: translate(-1px, 1px);
                text-shadow: -1px 0 #ff0000, 1px 0 #000000, 0 0 40px #ff0000;
            }
            40% { 
                opacity: 1;
                transform: translate(1px, -1px);
                letter-spacing: 8px;
                text-shadow: 3px 0 #ff0000, -3px 0 #000000, 0 0 30px #ff0000;
            }
            50% { 
                opacity: 0.95;
                transform: translate(0);
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
            }
            60% { 
                opacity: 0.8;
                transform: translate(-3px, 2px);
                text-shadow: -3px 0 #ff0000, 3px 0 #ff3333, 0 0 60px #ff0000;
            }
            70% { 
                opacity: 1;
                transform: translate(3px, -2px);
                letter-spacing: 10px;
            }
            80% { 
                opacity: 0.9;
                transform: translate(-1px, 1px);
                text-shadow: -1px 0 #000000, 1px 0 #ff0000, 0 0 40px #ff0000;
            }
            90% { 
                opacity: 1;
                transform: translate(1px, -1px);
            }
        }

        .sad-desc {
            color: #ffffff;
            font-size: 14px;
            line-height: 2;
            margin-bottom: 30px;
            opacity: 1;
            font-family: 'Courier Prime', monospace;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        .sad-desc span {
            color: #ff0000;
            font-size: 11px;
            animation: warningFlicker 0.3s infinite;
            text-shadow: 0 0 10px #ff0000;
            font-weight: bold;
            letter-spacing: 2px;
        }

        @keyframes warningFlicker {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px #ff0000; }
            50% { opacity: 0.3; text-shadow: 0 0 20px #ff0000, 0 0 30px #ff0000; }
        }

        /* Tombol Sad dengan Gambar Error - EXTREME */
        .sad-btn {
            background: #000000;
            border: 3px solid #ff0000;
            color: #ffffff;
            padding: 18px 30px;
            font-family: 'Creepster', cursive;
            font-size: 18px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: btnExtremeGlitch 1s infinite steps(2);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
            box-shadow: 
                0 0 20px rgba(255, 0, 0, 0.6),
                inset 0 0 20px rgba(139, 0, 0, 0.3);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
            font-weight: bold;
        }

        .sad-btn:hover {
            background: #ff0000;
            color: #000000;
            animation: btnGlitchFast 0.3s infinite;
            box-shadow: 
                0 0 40px rgba(255, 0, 0, 0.9),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            text-shadow: none;
        }

        @keyframes btnExtremeGlitch {
            0%, 100% { 
                transform: translate(0); 
                clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
                border-color: #ff0000;
            }
            10% { 
                transform: translate(-3px, 2px); 
                clip-path: polygon(5% 0, 95% 5%, 90% 95%, 0% 100%);
                border-color: #ff3333;
            }
            20% { 
                transform: translate(3px, -2px); 
                clip-path: polygon(-2% 5%, 102% 0, 97% 100%, -3% 95%);
                border-color: #ff0000;
            }
            30% { 
                transform: translate(-2px, 3px); 
                clip-path: polygon(3% 10%, 97% 0, 100% 90%, 2% 100%);
                border-color: #ff3333;
            }
            40% { 
                transform: translate(2px, -3px); 
                clip-path: polygon(-5% 0, 105% 5%, 92% 100%, 5% 95%);
                border-color: #ff0000;
            }
            50% { 
                transform: translate(0); 
                clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
                border-color: #ff0000;
            }
            60% { 
                transform: translate(-4px, 1px); 
                clip-path: polygon(8% 5%, 92% 0, 98% 95%, 0% 90%);
                border-color: #ff3333;
            }
            70% { 
                transform: translate(4px, -1px); 
                clip-path: polygon(-3% 8%, 103% 3%, 95% 98%, 3% 92%);
                border-color: #ff0000;
            }
            80% { 
                transform: translate(-1px, 4px); 
                clip-path: polygon(5% 0, 95% 10%, 90% 100%, 5% 90%);
                border-color: #ff3333;
            }
            90% { 
                transform: translate(1px, -4px); 
                clip-path: polygon(0% 5%, 100% 0, 95% 95%, 5% 100%);
                border-color: #ff0000;
            }
        }

        @keyframes btnGlitchFast {
            0%, 100% { transform: translate(0) scale(1); }
            25% { transform: translate(-4px, 3px) scale(1.05); }
            50% { transform: translate(4px, -3px) scale(0.95); }
            75% { transform: translate(-3px, -4px) scale(1.02); }
        }

        .sad-btn-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border: 2px solid #ff0000;
            filter: grayscale(100%) contrast(2) brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(4);
            animation: imgExtremeCorrupt 0.3s infinite steps(2);
            image-rendering: pixelated;
        }

        @keyframes imgExtremeCorrupt {
            0%, 100% { 
                transform: scale(1) rotate(0deg); 
                filter: grayscale(100%) contrast(2) brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(4);
            }
            25% { 
                transform: scale(1.2) rotate(5deg); 
                filter: grayscale(100%) contrast(3) brightness(0.3) sepia(1) hue-rotate(-30deg) saturate(5) invert(0.3);
            }
            50% { 
                transform: scale(0.9) rotate(-5deg); 
                filter: grayscale(100%) contrast(4) brightness(0.2) sepia(1) hue-rotate(-70deg) saturate(6);
            }
            75% { 
                transform: scale(1.1) rotate(3deg); 
                filter: grayscale(100%) contrast(2.5) brightness(0.4) sepia(1) hue-rotate(-40deg) saturate(4.5) invert(0.2);
            }
        }

        /* Image Switcher Container */
        .glitch-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s steps(2);
            overflow: hidden;
        }

        body.sad-mode .glitch-image-container {
            opacity: 0.3;
        }

        .glitch-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(3) brightness(0.2) sepia(1) hue-rotate(-50deg) saturate(5);
            image-rendering: pixelated;
            animation: bgExtremeGlitch 0.15s infinite;
        }

        @keyframes bgExtremeGlitch {
            0% { 
                transform: translate(0); 
                filter: grayscale(100%) contrast(3) brightness(0.2) sepia(1) hue-rotate(-50deg) saturate(5);
            }
            20% { 
                transform: translate(8px, 0); 
                filter: grayscale(100%) contrast(4) brightness(0.15) sepia(1) hue-rotate(-30deg) saturate(6) hue-rotate(90deg);
            }
            40% { 
                transform: translate(-8px, 8px); 
                filter: grayscale(100%) contrast(2) brightness(0.25) sepia(1) hue-rotate(-70deg) saturate(4);
            }
            60% { 
                transform: translate(0, -8px); 
                filter: grayscale(100%) contrast(5) brightness(0.1) sepia(1) hue-rotate(-40deg) saturate(7) hue-rotate(-90deg);
            }
            80% { 
                transform: translate(5px, 5px); 
                filter: grayscale(100%) contrast(3.5) brightness(0.18) sepia(1) hue-rotate(-60deg) saturate(5.5);
            }
            100% { 
                transform: translate(0); 
                filter: grayscale(100%) contrast(3) brightness(0.2) sepia(1) hue-rotate(-50deg) saturate(5);
            }
        }

        /* Corruption Overlay */
        .corruption-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(139, 0, 0, 0.05) 2px,
                rgba(139, 0, 0, 0.05) 4px
            );
            pointer-events: none;
            z-index: 9997;
            display: none;
            animation: corruptScroll 3s linear infinite;
        }

        body.sad-mode .corruption-overlay {
            display: block;
        }

        @keyframes corruptScroll {
            0% { background-position: 0 0; }
            100% { background-position: 0 100vh; }
        }

        /* Vignette effect */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 9996;
            display: none;
        }

        body.sad-mode .vignette {
            display: block;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .mode-toggle-btn { width: 60px; height: 60px; }
            .sad-title { font-size: 24px; letter-spacing: 6px; }
            body.sad-mode .card { margin: 20px; padding: 30px 20px; }

        }

        let isSadMode = false;

        let textInterval = null;
        let glitchInterval = null;
        let textStreamInterval = null;

        function createTextStream() {
            const container = document.getElementById('textStreamContainer');
            container.innerHTML = '';
            const columnCount = Math.floor(window.innerWidth / 100);
            
            for (let i = 0; i < columnCount; i++) {
                const column = document.createElement('div');
                column.className = 'text-column';
                column.style.left = (i * 100 + Math.random() * 50) + 'px';
                column.style.animationDuration = (8 + Math.random() * 10) + 's';
                column.style.animationDelay = (Math.random() * 5) + 's';
                
                let columnText = '';
                const textCount = 15 + Math.floor(Math.random() * 10);
                for (let j = 0; j < textCount; j++) {
                    const text = sadTexts[Math.floor(Math.random() * sadTexts.length)];
                    const color = textColors[Math.floor(Math.random() * textColors.length)];
                    columnText += `<div style="color: ${color}; margin: 8px 0; text-shadow: 0 0 8px ${color};">${text}</div>`;
                }
                
                column.innerHTML = columnText;
                container.appendChild(column);
            }

        function updateTextStream() {
            const columns = document.querySelectorAll('.text-column');
            columns.forEach(column => {
                if (Math.random() > 0.7) {
                    const text = sadTexts[Math.floor(Math.random() * sadTexts.length)];
                    const color = textColors[Math.floor(Math.random() * textColors.length)];
                    const divs = column.querySelectorAll('div');
                    if (divs.length > 0) {
                        const randomDiv = divs[Math.floor(Math.random() * divs.length)];
                        randomDiv.textContent = text;
                        randomDiv.style.color = color;
                        randomDiv.style.textShadow = `0 0 8px ${color}`;
                    }
                }
            });
        }

        function toggleMode() {
            isSadMode = !isSadMode;
            document.body.className = isSadMode ? 'sad-mode' : 'happy-mode';

            if (isSadMode) {
                startExtremeGlitch();
                createTextStream();
                textStreamInterval = setInterval(updateTextStream, 500);
            } else {
                stopExtremeGlitch();
                clearInterval(textStreamInterval);
                document.getElementById('textStreamContainer').innerHTML = '';

        function startExtremeGlitch() {

            clearInterval(imageInterval);
            clearInterval(bgInterval);
            clearInterval(textInterval);
            clearInterval(glitchInterval);
            document.getElementById('toggleImg').src = 'tes.jpg';
            document.getElementById('glitchBgImage').src = '';

                card.style.clipPath = '';
